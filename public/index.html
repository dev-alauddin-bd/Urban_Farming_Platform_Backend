<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Urban Farming API</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at top, #1CD15D, #0b1b13 60%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container {
            text-align: center;
            padding: 50px;
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            width: 420px;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 10px;
            color: #1CD15D;
        }

        .status {
            font-size: 16px;
            margin-bottom: 20px;
            opacity: 0.8;
        }

        .badge {
            display: inline-block;
            padding: 6px 12px;
            background: #1CD15D;
            color: black;
            border-radius: 20px;
            font-size: 12px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .btn {
            margin-top: 15px;
            display: inline-block;
            padding: 10px 18px;
            background: transparent;
            border: 1px solid #1CD15D;
            color: #1CD15D;
            border-radius: 8px;
            text-decoration: none;
            transition: 0.3s;
        }

        .btn:hover {
            background: #1CD15D;
            color: black;
        }
    </style>

</head>

<body>

    <div class="container">

        <div class="badge">🚀 API ONLINE</div>

        <h1>Urban Farming API</h1>

        <div class="status">Backend is running successfully</div>

        <!-- Swagger Button -->
        <a href="/api-docs" class="btn">📘 Open Swagger Docs</a>

    </div>

</body>

</html>
