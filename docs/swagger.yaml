openapi: 3.0.0

info:
  title: Urban Farming Platform API
  version: 1.0.0
  description: |
    This API handles authentication, user management,
    and role-based access control for Admin, Vendor, and Customer.


servers:
  - url: https://urbanfarmingplatformbackend-production.up.railway.app/api/v1
    description: Production server



# =========================
# 🔐 SECURITY SCHEME
# =========================
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

# =========================
# 📌 ALL API ROUTES
# =========================
paths:

  # =========================
  # 🔐 AUTH ROUTES
  # =========================
  /auth/register:
    post:
      summary: Register a new user
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: John Doe
                email:
                  type: string
                  example: john@example.com
                password:
                  type: string
                  example: 123456
                role:
                  type: string
                  enum: [CUSTOMER, VENDOR]
      responses:
        201:
          description: User registered successfully

  /auth/login:
    post:
      summary: Login user
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  example: john@example.com
                password:
                  type: string
                  example: 123456
      responses:
        200:
          description: Login successful

  /auth/logout:
    post:
      summary: Logout user
      tags:
        - Auth
      responses:
        200:
          description: Logout successful

  /auth/refresh-token:
    post:
      summary: Refresh access token
      tags:
        - Auth
      responses:
        200:
          description: Token refreshed successfully

  # =========================
  # 👤 USER PROFILE
  # =========================
  /users/me:
    get:
      summary: Get logged-in user profile
      tags:
        - Users
      security:
        - bearerAuth: []
      responses:
        200:
          description: Profile fetched successfully

    patch:
      summary: Update logged-in user profile
      tags:
        - Users
      security:
        - bearerAuth: []
      responses:
        200:
          description: Profile updated successfully

  # =========================
  # 👥 ADMIN - USERS
  # =========================
  /users:
    get:
      summary: Get all users
      tags:
        - Users
      security:
        - bearerAuth: []
      responses:
        200:
          description: Users fetched successfully

  /users/{id}:
    get:
      summary: Get single user
      tags:
        - Users
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        200:
          description: User fetched successfully

    delete:
      summary: Delete user
      tags:
        - Users
      security:
        - bearerAuth: []
      responses:
        200:
          description: User deleted successfully

  /users/{id}/status:
    patch:
      summary: Change user status
      tags:
        - Users
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  example: ACTIVE
      responses:
        200:
          description: Status updated successfully


  # =========================
  # 🥦 CREATE PRODUCE
  # =========================
  /produces:
    post:
      summary: Create new produce
      tags:
        - Produce
      security:
        - bearerAuth: []
      description: Only Vendor and Admin can create produce
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - price
                - category
                - availableQuantity
              properties:
                name:
                  type: string
                  example: Organic Tomato
                description:
                  type: string
                  example: Fresh organic tomatoes
                price:
                  type: number
                  example: 120
                category:
                  type: string
                  example: Vegetable
                availableQuantity:
                  type: number
                  example: 50
      responses:
        201:
          description: Produce created successfully

    # =========================
    # 📦 GET ALL PRODUCES
    # =========================
    get:
      summary: Get all produces
      tags:
        - Produce
      description: Public endpoint for browsing produce marketplace
      responses:
        200:
          description: List of produces fetched successfully

  # =========================
  # 📦 SINGLE PRODUCE
  # =========================
  /produces/{id}:

    get:
      summary: Get single produce
      tags:
        - Produce
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        200:
          description: Produce fetched successfully

    # =========================
    # ✏️ UPDATE PRODUCE
    # =========================
    patch:
      summary: Update produce
      tags:
        - Produce
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                price:
                  type: number
                availableQuantity:
                  type: number
      responses:
        200:
          description: Produce updated successfully

    # =========================
    # 🗑 DELETE PRODUCE
    # =========================
    delete:
      summary: Delete produce
      tags:
        - Produce
      security:
        - bearerAuth: []
      responses:
        200:
          description: Produce deleted successfully


  # =========================
  # 🏡 CREATE RENTAL SPACE
  # =========================
  /rentalSpaces:
    post:
      summary: Create rental space
      tags:
        - Rental Space
      security:
        - bearerAuth: []
      description: Only VENDOR can create rental spaces
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - location
                - size
                - price
              properties:
                location:
                  type: string
                  example: Dhaka, Bangladesh
                size:
                  type: string
                  example: 500 sq ft
                price:
                  type: number
                  example: 5000
                availability:
                  type: boolean
                  example: true
      responses:
        201:
          description: Rental space created successfully

  # =========================
  # 📦 GET ALL RENTAL SPACES
  # =========================
    get:
      summary: Get all rental spaces
      tags:
        - Rental Space
      description: Public endpoint for browsing rental spaces
      responses:
        200:
          description: Rental spaces fetched successfully

  # =========================
  # 📦 SINGLE RENTAL SPACE
  # =========================
  /rentalSpaces/{id}:

    get:
      summary: Get single rental space
      tags:
        - Rental Space
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        200:
          description: Rental space fetched successfully

    # =========================
    # ✏️ UPDATE RENTAL SPACE
    # =========================
    patch:
      summary: Update rental space
      tags:
        - Rental Space
      security:
        - bearerAuth: []
      description: Only VENDOR can update their rental space
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                location:
                  type: string
                size:
                  type: string
                price:
                  type: number
                availability:
                  type: boolean
      responses:
        200:
          description: Rental space updated successfully

    # =========================
    # 🗑 DELETE RENTAL SPACE
    # =========================
    delete:
      summary: Delete rental space
      tags:
        - Rental Space
      security:
        - bearerAuth: []
      description: Only VENDOR can delete rental space
      responses:
        200:
          description: Rental space deleted successfully

  # =========================
  # 🛒 CREATE ORDER (CUSTOMER)
  # =========================
  /orders:
    post:
      summary: Create new order
      tags:
        - Order
      security:
        - bearerAuth: []
      description: Only CUSTOMER can place an order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - produceId
                - quantity
              properties:
                produceId:
                  type: string
                  example: "clx123abc"
                quantity:
                  type: number
                  example: 2
      responses:
        201:
          description: Order created successfully

  # =========================
  # 📦 CUSTOMER ORDERS
  # =========================
  /orders/my-orders:
    get:
      summary: Get my orders
      tags:
        - Order
      security:
        - bearerAuth: []
      description: Returns orders of logged-in CUSTOMER (cached endpoint)
      responses:
        200:
          description: Customer orders fetched successfully

  # =========================
  # 🧑‍🌾 VENDOR ORDERS
  # =========================
  /orders/vendor-orders:
    get:
      summary: Get vendor orders
      tags:
        - Order
      security:
        - bearerAuth: []
      description: Returns orders for logged-in VENDOR (cached endpoint)
      responses:
        200:
          description: Vendor orders fetched successfully



  # =========================
  # 💬 CREATE POST
  # =========================
  /community:
    post:
      summary: Create community post
      tags:
        - Community
      security:
        - bearerAuth: []
      description: |
        Allows CUSTOMER, VENDOR, and ADMIN to create a community post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - postContent
              properties:
                postContent:
                  type: string
                  example: "How to grow organic tomatoes in small space?"
      responses:
        201:
          description: Post created successfully

  # =========================
  # 📦 GET ALL POSTS
  # =========================
    get:
      summary: Get all community posts
      tags:
        - Community
      description: |
        Returns all community posts with pagination and caching enabled
      parameters:
        - in: query
          name: page
          schema:
            type: integer
          example: 1
        - in: query
          name: limit
          schema:
            type: integer
          example: 10
      responses:
        200:
          description: Posts fetched successfully

  # =========================
  # 📜 UPLOAD CERTIFICATION (VENDOR)
  # =========================
  /sustainability/upload:
    post:
      summary: Upload sustainability certification
      tags:
        - Sustainability
      security:
        - bearerAuth: []
      description: Only VENDOR can upload organic certification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - certifyingAgency
                - certificationDate
              properties:
                certifyingAgency:
                  type: string
                  example: "Organic Bangladesh Authority"
                certificationDate:
                  type: string
                  format: date
                  example: "2026-04-18"

      responses:
        201:
          description: Certification uploaded successfully

  # =========================
  # 📄 GET ALL CERTIFICATIONS (ADMIN)
  # =========================
  /sustainability:
    get:
      summary: Get all sustainability certifications
      tags:
        - Sustainability
      security:
        - bearerAuth: []
      description: Only ADMIN can view all certifications
      responses:
        200:
          description: Certifications fetched successfully

  # =========================
  # ✅ VALIDATE CERTIFICATION (ADMIN)
  # =========================
  /sustainability/{id}/validate:
    patch:
      summary: Validate certification
      tags:
        - Sustainability
      security:
        - bearerAuth: []
      description: Admin validates vendor organic certification
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Certification ID
      responses:
        200:
          description: Certification validated successfully



  # =========================
  # 🌱 CREATE PLANT
  # =========================
  /plants:
    post:
      summary: Create a new plant tracking entry
      tags:
        - Plants
      security:
        - bearerAuth: []
      description: Only CUSTOMER can create plant tracking entries
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - growthStage
              properties:
                name:
                  type: string
                  example: Tomato Plant
                growthStage:
                  type: string
                  example: Seedling
                healthStatus:
                  type: string
                  example: Healthy
      responses:
        201:
          description: Plant created successfully

  # =========================
  # 🌿 GET MY PLANTS
  # =========================
  /plants/my-plants:
    get:
      summary: Get logged-in user's plants
      tags:
        - Plants
      security:
        - bearerAuth: []
      description: Returns all plants of the logged-in customer (cached)
      responses:
        200:
          description: Plants fetched successfully

  # =========================
  # 🌱 UPDATE PLANT STATUS
  # =========================
  /plants/{id}:
    patch:
      summary: Update plant status
      tags:
        - Plants
      security:
        - bearerAuth: []
      description: Update growth stage or health status of plant
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                growthStage:
                  type: string
                  example: Flowering
                healthStatus:
                  type: string
                  example: Needs Water
      responses:
        200:
          description: Plant updated successfully